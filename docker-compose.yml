version: '3'

services:
  app:
      container_name: nestJs
      build:
        context: ./
        dockerfile: Dockerfile
      volumes:
        - ./my-app:/usr/src/app
        - /usr/src/app/node_modules
      ports:
        - "5000:3000"
      entrypoint:
        - /usr/bin/tini
        - --
      command: npm run start:dev